<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="800" viewBox="0 0 1280 800"
     font-family="-apple-system, system-ui, sans-serif" fill="#fff" stroke="#000" stroke-width="1.5">
  <!-- viewport: desktop 1280x800 -->
  <rect x="0" y="0" width="1280" height="800" />
  <!-- 1: primary nav -->
  <g transform="translate(0,0)" data-region="nav"><rect width="1280" height="64" /><rect x="24" y="16" width="32" height="32" rx="4" fill="#e6e6e6" /><text x="72" y="40" font-size="20" font-weight="600" stroke="none" fill="#000">Feed</text><text x="160" y="40" font-size="14" stroke="none" fill="#000">For you</text><text x="240" y="40" font-size="14" stroke="none" fill="#666">Saved</text><text x="312" y="40" font-size="14" stroke="none" fill="#666">Activity</text><g transform="translate(944,12)"><rect width="200" height="40" rx="20" /><text x="24" y="24" font-size="14" stroke="none" fill="#666">Search Feed…</text></g><circle cx="1232" cy="32" r="16" fill="#e6e6e6" /></g>
  <!-- 2: feed header and ask action -->
  <g transform="translate(48,96)" data-region="feed-header"><text x="0" y="32" font-size="28" font-weight="700" stroke="none" fill="#000">For you</text><text x="0" y="64" font-size="14" stroke="none" fill="#666">Useful things made from your recent context.</text><g transform="translate(968,0)"><rect width="216" height="40" rx="4" fill="#000" /><text x="108" y="24" font-size="14" font-weight="600" text-anchor="middle" stroke="none" fill="#fff">Ask Feed</text></g></g>
  <!-- 3: generated item stream -->
  <g transform="translate(48,192)" data-region="feed-list">
    <g><rect width="760" height="240" rx="6" /><text x="24" y="32" font-size="12" stroke="none" fill="#666">INSIGHT · FROM 3 CONVERSATIONS</text><text x="24" y="72" font-size="20" font-weight="600" stroke="none" fill="#000">The decision that keeps resurfacing</text><text x="24" y="104" font-size="14" stroke="none" fill="#666">A short synthesis of what changed, what stayed unresolved, and why it matters.</text><rect x="24" y="128" width="712" height="48" fill="#e6e6e6" /><text x="24" y="208" font-size="14" stroke="none" fill="#000">Save</text><text x="88" y="208" font-size="14" stroke="none" fill="#000">Helpful</text><text x="176" y="208" font-size="14" stroke="none" fill="#000">Less like this</text><text x="712" y="208" font-size="12" text-anchor="end" stroke="none" fill="#666">Why this?</text></g>
    <g transform="translate(0,264)"><rect width="760" height="224" rx="6" /><text x="24" y="32" font-size="12" stroke="none" fill="#666">BRIEF · FROM YOUR LISTEN CONTEXT</text><text x="24" y="72" font-size="20" font-weight="600" stroke="none" fill="#000">A person worth following up with</text><text x="24" y="104" font-size="14" stroke="none" fill="#666">Recent mentions suggest a useful next conversation.</text><rect x="24" y="128" width="712" height="32" fill="#e6e6e6" /><text x="24" y="200" font-size="14" stroke="none" fill="#000">Save</text><text x="88" y="200" font-size="14" stroke="none" fill="#000">Helpful</text><text x="176" y="200" font-size="14" stroke="none" fill="#000">Less like this</text></g>
  </g>
  <!-- 4: quiet automation rail -->
  <g transform="translate(832,192)" data-region="right-rail"><rect width="400" height="224" rx="6" /><text x="24" y="40" font-size="20" font-weight="600" stroke="none" fill="#000">Working quietly</text><text x="24" y="72" font-size="14" stroke="none" fill="#666">Feed checks for useful new context automatically.</text><line x1="24" y1="104" x2="376" y2="104" stroke="#666" /><text x="24" y="136" font-size="14" stroke="none" fill="#000">Last refresh</text><text x="376" y="136" font-size="14" text-anchor="end" stroke="none" fill="#666">12 minutes ago</text><text x="24" y="176" font-size="14" stroke="none" fill="#000">Next check</text><text x="376" y="176" font-size="14" text-anchor="end" stroke="none" fill="#666">Later today</text><text x="24" y="208" font-size="12" text-decoration="underline" stroke="none" fill="#000">View Feed activity</text></g>
  <!-- 5: account menu entry point -->
  <g transform="translate(1032,80)"><rect width="200" height="144" rx="4" /><text x="16" y="32" font-size="14" stroke="none" fill="#000">Account</text><text x="16" y="64" font-size="14" stroke="none" fill="#000">Feed preferences</text><text x="16" y="96" font-size="14" stroke="none" fill="#000">Access &amp; automation</text><line x1="0" y1="112" x2="200" y2="112" /><text x="16" y="136" font-size="14" stroke="none" fill="#000">Sign out</text></g>
  <g data-region="annotations"><circle cx="16" cy="16" r="12" fill="#fff" stroke="#d33" stroke-dasharray="4 2" /><text x="16" y="20" font-size="12" font-weight="700" text-anchor="middle" stroke="none" fill="#d33">1</text><circle cx="32" cy="88" r="12" fill="#fff" stroke="#d33" stroke-dasharray="4 2" /><text x="32" y="92" font-size="12" font-weight="700" text-anchor="middle" stroke="none" fill="#d33">2</text><circle cx="32" cy="184" r="12" fill="#fff" stroke="#d33" stroke-dasharray="4 2" /><text x="32" y="188" font-size="12" font-weight="700" text-anchor="middle" stroke="none" fill="#d33">3</text><circle cx="816" cy="184" r="12" fill="#fff" stroke="#d33" stroke-dasharray="4 2" /><text x="816" y="188" font-size="12" font-weight="700" text-anchor="middle" stroke="none" fill="#d33">4</text><circle cx="1016" cy="72" r="12" fill="#fff" stroke="#d33" stroke-dasharray="4 2" /><text x="1016" y="76" font-size="12" font-weight="700" text-anchor="middle" stroke="none" fill="#d33">5</text></g>
</svg>
