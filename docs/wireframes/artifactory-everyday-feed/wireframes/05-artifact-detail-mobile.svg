<svg xmlns="http://www.w3.org/2000/svg" width="375" height="812" viewBox="0 0 375 812"
     font-family="-apple-system, system-ui, sans-serif" fill="#fff" stroke="#000" stroke-width="1.5">
  <!-- viewport: mobile 375x812 -->
  <rect x="0" y="0" width="375" height="812" />
  <g><rect width="375" height="64" /><text x="16" y="40" font-size="14" stroke="none" fill="#000">← Feed</text><text x="343" y="40" font-size="14" text-anchor="end" stroke="none" fill="#666">•••</text></g>
  <!-- 1: content -->
  <g transform="translate(16,96)"><text x="0" y="16" font-size="12" stroke="none" fill="#666">INSIGHT · 12 MINUTES AGO</text><text x="0" y="56" font-size="28" font-weight="700" stroke="none" fill="#000">The decision that</text><text x="0" y="88" font-size="28" font-weight="700" stroke="none" fill="#000">keeps resurfacing</text><text x="0" y="128" font-size="14" stroke="none" fill="#666">Across three recent conversations.</text><line x1="0" y1="160" x2="343" y2="160" stroke="#666" /><text x="0" y="200" font-size="20" font-weight="600" stroke="none" fill="#000">What changed</text><text x="0" y="240" font-size="14" stroke="none" fill="#000">The debate moved from whether to ship</text><text x="0" y="264" font-size="14" stroke="none" fill="#000">to deciding which boundary owns it.</text><rect x="0" y="296" width="343" height="80" rx="6" fill="#e6e6e6" /></g>
  <!-- 2: actions -->
  <g transform="translate(16,504)"><rect width="88" height="48" rx="4" fill="#000" /><text x="44" y="32" font-size="14" text-anchor="middle" stroke="none" fill="#fff">Save</text><rect x="104" width="104" height="48" rx="4" /><text x="156" y="32" font-size="14" text-anchor="middle" stroke="none" fill="#000">Helpful</text><rect x="224" width="120" height="48" rx="4" /><text x="284" y="32" font-size="14" text-anchor="middle" stroke="none" fill="#000">Less like this</text></g>
  <!-- 3: provenance disclosure -->
  <g transform="translate(16,584)"><rect width="343" height="152" rx="6" /><text x="16" y="40" font-size="20" font-weight="600" stroke="none" fill="#000">Why you're seeing this</text><text x="16" y="72" font-size="14" stroke="none" fill="#666">The same decision appeared in 3 talks.</text><text x="16" y="104" font-size="14" text-decoration="underline" stroke="none" fill="#000">View 3 sources and quoted moments</text><text x="16" y="136" font-size="12" stroke="none" fill="#666">No outside sources were used.</text></g>
  <g data-region="annotations"><circle cx="8" cy="88" r="8" fill="#fff" stroke="#d33" stroke-dasharray="4 2" /><text x="8" y="92" font-size="12" font-weight="700" text-anchor="middle" stroke="none" fill="#d33">1</text><circle cx="8" cy="496" r="8" fill="#fff" stroke="#d33" stroke-dasharray="4 2" /><text x="8" y="500" font-size="12" font-weight="700" text-anchor="middle" stroke="none" fill="#d33">2</text><circle cx="8" cy="576" r="8" fill="#fff" stroke="#d33" stroke-dasharray="4 2" /><text x="8" y="580" font-size="12" font-weight="700" text-anchor="middle" stroke="none" fill="#d33">3</text></g>
</svg>
