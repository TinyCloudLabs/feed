<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="800" viewBox="0 0 1280 800"
     font-family="-apple-system, system-ui, sans-serif" fill="#fff" stroke="#000" stroke-width="1.5">
  <!-- viewport: desktop 1280x800 -->
  <rect x="0" y="0" width="1280" height="800" />
  <!-- 1: settings nav -->
  <g><rect width="1280" height="64" /><text x="24" y="40" font-size="14" stroke="none" fill="#000">← Feed</text><text x="112" y="40" font-size="20" font-weight="600" stroke="none" fill="#000">Settings</text><circle cx="1232" cy="32" r="16" fill="#e6e6e6" /></g>
  <g transform="translate(48,104)" data-region="settings-nav"><text x="0" y="16" font-size="14" stroke="none" fill="#666">Account</text><text x="0" y="64" font-size="14" stroke="none" fill="#666">Feed preferences</text><rect x="-8" y="88" width="224" height="40" fill="#e6e6e6" /><text x="0" y="112" font-size="14" font-weight="600" stroke="none" fill="#000">Access &amp; automation</text><text x="0" y="160" font-size="14" stroke="none" fill="#666">Notifications</text></g>
  <!-- 2: plain-language authority summary -->
  <g transform="translate(320,104)" data-region="authority-summary"><text x="0" y="32" font-size="28" font-weight="700" stroke="none" fill="#000">Access &amp; automation</text><text x="0" y="64" font-size="14" stroke="none" fill="#666">See what Feed can use, pause automatic work, or disconnect it.</text><g transform="translate(0,104)"><rect width="864" height="88" rx="6" /><circle cx="40" cy="44" r="16" fill="#000" /><text x="40" y="48" font-size="14" text-anchor="middle" stroke="none" fill="#fff">✓</text><text x="72" y="40" font-size="14" font-weight="600" stroke="none" fill="#000">Feed access is healthy</text><text x="72" y="64" font-size="12" stroke="none" fill="#666">Signed in once · Last checked 12 minutes ago</text><g transform="translate(720,24)"><rect width="120" height="40" rx="4" /><text x="60" y="24" font-size="14" text-anchor="middle" stroke="none" fill="#000">Pause Feed</text></g></g></g>
  <!-- 3: user-meaningful access chain -->
  <g transform="translate(320,320)" data-region="access-chain"><text x="0" y="24" font-size="20" font-weight="600" stroke="none" fill="#000">What Feed can do</text>
    <g transform="translate(0,56)"><rect width="864" height="72" rx="4" /><text x="24" y="32" font-size="14" font-weight="600" stroke="none" fill="#000">Read Listen context</text><text x="24" y="56" font-size="12" stroke="none" fill="#666">Conversations and transcripts · read only</text><rect x="792" y="24" width="40" height="20" rx="10" fill="#000" /><circle cx="822" cy="34" r="6" fill="#fff" /></g>
    <g transform="translate(0,144)"><rect width="864" height="72" rx="4" /><text x="24" y="32" font-size="14" font-weight="600" stroke="none" fill="#000">Make Feed items</text><text x="24" y="56" font-size="12" stroke="none" fill="#666">Artifactory and its agent can create grounded drafts</text><rect x="792" y="24" width="40" height="20" rx="10" fill="#000" /><circle cx="822" cy="34" r="6" fill="#fff" /></g>
    <g transform="translate(0,232)"><rect width="864" height="72" rx="4" /><text x="24" y="32" font-size="14" font-weight="600" stroke="none" fill="#000">Save Feed state</text><text x="24" y="56" font-size="12" stroke="none" fill="#666">Artifacts, preferences, and feedback in your TinyCloud space</text><rect x="792" y="24" width="40" height="20" rx="10" fill="#000" /><circle cx="822" cy="34" r="6" fill="#fff" /></g>
  </g>
  <!-- 4: advanced disclosure, collapsed -->
  <g transform="translate(320,648)" data-region="advanced"><rect width="864" height="64" rx="4" /><text x="24" y="40" font-size="14" stroke="none" fill="#000">› Advanced authority details</text><text x="840" y="40" font-size="12" text-anchor="end" stroke="none" fill="#666">Delegations, services, expiry</text></g>
  <!-- 5: disconnect -->
  <g transform="translate(320,736)"><text x="0" y="16" font-size="14" font-weight="600" stroke="none" fill="#000">Disconnect Feed</text><text x="0" y="40" font-size="12" stroke="none" fill="#666">Revokes Feed's access. Your TinyCloud source data is not deleted.</text><g transform="translate(720,0)"><rect width="144" height="40" rx="4" /><text x="72" y="24" font-size="14" text-anchor="middle" stroke="none" fill="#000">Disconnect</text></g></g>
  <g data-region="annotations"><circle cx="304" cy="96" r="12" fill="#fff" stroke="#d33" stroke-dasharray="4 2" /><text x="304" y="100" font-size="12" font-weight="700" text-anchor="middle" stroke="none" fill="#d33">1</text><circle cx="304" cy="200" r="12" fill="#fff" stroke="#d33" stroke-dasharray="4 2" /><text x="304" y="204" font-size="12" font-weight="700" text-anchor="middle" stroke="none" fill="#d33">2</text><circle cx="304" cy="312" r="12" fill="#fff" stroke="#d33" stroke-dasharray="4 2" /><text x="304" y="316" font-size="12" font-weight="700" text-anchor="middle" stroke="none" fill="#d33">3</text><circle cx="304" cy="640" r="12" fill="#fff" stroke="#d33" stroke-dasharray="4 2" /><text x="304" y="644" font-size="12" font-weight="700" text-anchor="middle" stroke="none" fill="#d33">4</text><circle cx="304" cy="728" r="12" fill="#fff" stroke="#d33" stroke-dasharray="4 2" /><text x="304" y="732" font-size="12" font-weight="700" text-anchor="middle" stroke="none" fill="#d33">5</text></g>
</svg>
