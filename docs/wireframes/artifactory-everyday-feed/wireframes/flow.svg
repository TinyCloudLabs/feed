<svg xmlns="http://www.w3.org/2000/svg" width="1792" height="520" viewBox="0 0 1792 520"
     font-family="-apple-system, system-ui, sans-serif" fill="#fff" stroke="#000" stroke-width="1.5">
  <!-- flow summary: everyday Feed user; black solid = primary path, black dashed = optional path -->
  <rect x="0" y="0" width="1792" height="520" />
  <text x="32" y="48" font-size="28" font-weight="700" stroke="none" fill="#000">One sign-in, then Feed becomes the task</text>
  <text x="32" y="80" font-size="14" stroke="none" fill="#666">Delegation and bundle mechanics remain automatic; access details are optional.</text>

  <!-- screen 1 -->
  <g transform="translate(32,144)"><rect width="240" height="240" rx="6" /><text x="16" y="32" font-size="12" stroke="none" fill="#666">1</text><text x="16" y="64" font-size="20" font-weight="600" stroke="none" fill="#000">Sign in</text><rect x="40" y="96" width="160" height="64" fill="#e6e6e6" /><rect x="40" y="184" width="160" height="40" rx="4" fill="#000" /><text x="120" y="208" font-size="14" text-anchor="middle" stroke="none" fill="#fff">OpenKey</text></g>
  <!-- arrow -->
  <g transform="translate(280,264)"><line x1="0" y1="0" x2="40" y2="0" /><polygon points="40,0 32,-8 32,8" fill="#000" stroke="none" /></g>
  <!-- screen 2 -->
  <g transform="translate(328,144)"><rect width="240" height="240" rx="6" /><text x="16" y="32" font-size="12" stroke="none" fill="#666">2</text><text x="16" y="64" font-size="20" font-weight="600" stroke="none" fill="#000">Automatic setup</text><circle cx="40" cy="112" r="12" fill="#000" /><line x1="64" y1="112" x2="200" y2="112" stroke="#666" /><circle cx="40" cy="160" r="12" fill="#000" /><line x1="64" y1="160" x2="200" y2="160" stroke="#666" /><circle cx="40" cy="208" r="12" /><line x1="64" y1="208" x2="200" y2="208" stroke="#666" /></g>
  <!-- arrow -->
  <g transform="translate(576,264)"><line x1="0" y1="0" x2="40" y2="0" /><polygon points="40,0 32,-8 32,8" fill="#000" stroke="none" /></g>
  <!-- screen 3 -->
  <g transform="translate(624,144)"><rect width="240" height="240" rx="6" /><text x="16" y="32" font-size="12" stroke="none" fill="#666">3</text><text x="16" y="64" font-size="20" font-weight="600" stroke="none" fill="#000">Feed</text><rect x="16" y="88" width="208" height="56" rx="4" fill="#e6e6e6" /><rect x="16" y="160" width="208" height="56" rx="4" fill="#e6e6e6" /></g>
  <!-- arrow to ask -->
  <g transform="translate(872,264)"><line x1="0" y1="0" x2="40" y2="0" /><polygon points="40,0 32,-8 32,8" fill="#000" stroke="none" /></g>
  <!-- screen 4 -->
  <g transform="translate(920,144)"><rect width="240" height="240" rx="6" /><text x="16" y="32" font-size="12" stroke="none" fill="#666">4</text><text x="16" y="64" font-size="20" font-weight="600" stroke="none" fill="#000">Ask Feed</text><rect x="16" y="88" width="208" height="56" rx="4" /><rect x="16" y="160" width="208" height="64" rx="4" fill="#e6e6e6" /></g>
  <!-- ask result returns to feed -->
  <path d="M1040 392 L1040 440 L744 440 L744 392" fill="none" stroke="#000" stroke-dasharray="8 8" />
  <polygon points="744,392 736,408 752,408" fill="#000" stroke="none" />
  <text x="888" y="472" font-size="12" text-anchor="middle" stroke="none" fill="#666">answer appears in Feed and Activity</text>
  <!-- optional branch to artifact -->
  <g transform="translate(1168,264)"><line x1="0" y1="0" x2="40" y2="0" stroke-dasharray="8 8" /><polygon points="40,0 32,-8 32,8" fill="#000" stroke="none" /></g>
  <g transform="translate(1216,144)"><rect width="240" height="240" rx="6" /><text x="16" y="32" font-size="12" stroke="none" fill="#666">5</text><text x="16" y="64" font-size="20" font-weight="600" stroke="none" fill="#000">Artifact detail</text><line x1="16" y1="96" x2="216" y2="96" stroke="#666" /><line x1="16" y1="128" x2="216" y2="128" stroke="#666" /><rect x="16" y="160" width="208" height="64" fill="#e6e6e6" /></g>
  <!-- optional branch to settings -->
  <g transform="translate(1464,264)"><line x1="0" y1="0" x2="40" y2="0" stroke-dasharray="8 8" /><polygon points="40,0 32,-8 32,8" fill="#000" stroke="none" /></g>
  <g transform="translate(1512,144)"><rect width="240" height="240" rx="6" /><text x="16" y="32" font-size="12" stroke="none" fill="#666">6</text><text x="16" y="64" font-size="20" font-weight="600" stroke="none" fill="#000">Access details</text><rect x="16" y="88" width="208" height="48" rx="4" /><rect x="16" y="152" width="208" height="48" rx="4" /><rect x="16" y="216" width="208" height="16" fill="#e6e6e6" /></g>

  <text x="1336" y="416" font-size="12" text-anchor="middle" stroke="none" fill="#666">optional provenance</text>
  <text x="1632" y="416" font-size="12" text-anchor="middle" stroke="none" fill="#666">optional authority controls</text>
</svg>
