<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="800" viewBox="0 0 1280 800"
     font-family="-apple-system, system-ui, sans-serif" fill="#fff" stroke="#000" stroke-width="1.5">
  <!-- viewport: desktop 1280x800 -->
  <rect x="0" y="0" width="1280" height="800" />
  <!-- 1: nav and return path -->
  <g><rect width="1280" height="64" /><rect x="24" y="16" width="32" height="32" rx="4" fill="#e6e6e6" /><text x="72" y="40" font-size="20" font-weight="600" stroke="none" fill="#000">Feed</text><text x="160" y="40" font-size="14" stroke="none" fill="#000">← Back to Feed</text><circle cx="1232" cy="32" r="16" fill="#e6e6e6" /></g>
  <!-- 2: artifact content -->
  <g transform="translate(160,104)" data-region="artifact"><text x="0" y="16" font-size="12" stroke="none" fill="#666">INSIGHT · MADE 12 MINUTES AGO</text><text x="0" y="64" font-size="28" font-weight="700" stroke="none" fill="#000">The decision that keeps resurfacing</text><text x="0" y="104" font-size="14" stroke="none" fill="#666">A synthesis across recent conversations.</text><line x1="0" y1="136" x2="720" y2="136" stroke="#666" /><text x="0" y="184" font-size="20" font-weight="600" stroke="none" fill="#000">What changed</text><text x="0" y="224" font-size="14" stroke="none" fill="#000">The team moved from debating whether to ship the integration to deciding</text><text x="0" y="248" font-size="14" stroke="none" fill="#000">which boundary should own it. The unresolved question is now operational.</text><rect x="0" y="280" width="720" height="104" rx="6" fill="#e6e6e6" /><text x="0" y="424" font-size="20" font-weight="600" stroke="none" fill="#000">Suggested next step</text><text x="0" y="464" font-size="14" stroke="none" fill="#000">Name one owner and test the delegation path with a real transcript.</text><g transform="translate(0,520)"><rect width="96" height="40" rx="4" fill="#000" /><text x="48" y="24" font-size="14" text-anchor="middle" stroke="none" fill="#fff">Save</text><rect x="112" width="96" height="40" rx="4" /><text x="160" y="24" font-size="14" text-anchor="middle" stroke="none" fill="#000">Helpful</text><rect x="224" width="120" height="40" rx="4" /><text x="284" y="24" font-size="14" text-anchor="middle" stroke="none" fill="#000">Less like this</text></g></g>
  <!-- 3: human-readable provenance -->
  <g transform="translate(928,104)" data-region="provenance"><rect width="304" height="528" rx="6" /><text x="24" y="40" font-size="20" font-weight="600" stroke="none" fill="#000">Why you're seeing this</text><text x="24" y="72" font-size="14" stroke="none" fill="#666">Feed found the same decision in</text><text x="24" y="96" font-size="14" stroke="none" fill="#666">three recent conversations.</text><line x1="24" y1="128" x2="280" y2="128" stroke="#666" /><text x="24" y="168" font-size="14" font-weight="600" stroke="none" fill="#000">Sources</text><g transform="translate(24,192)"><rect width="256" height="72" rx="4" /><text x="16" y="24" font-size="14" stroke="none" fill="#000">TinyCloud team meeting</text><text x="16" y="48" font-size="12" stroke="none" fill="#666">2 quoted moments · yesterday</text></g><g transform="translate(24,280)"><rect width="256" height="72" rx="4" /><text x="16" y="24" font-size="14" stroke="none" fill="#000">Product review</text><text x="16" y="48" font-size="12" stroke="none" fill="#666">1 quoted moment · 3 days ago</text></g><g transform="translate(24,368)"><rect width="256" height="72" rx="4" /><text x="16" y="24" font-size="14" stroke="none" fill="#000">Follow-up conversation</text><text x="16" y="48" font-size="12" stroke="none" fill="#666">1 quoted moment · 4 days ago</text></g><text x="24" y="480" font-size="12" text-decoration="underline" stroke="none" fill="#000">View source excerpts</text><text x="24" y="512" font-size="12" stroke="none" fill="#666">No outside sources were used.</text></g>
  <g data-region="annotations"><circle cx="144" cy="96" r="12" fill="#fff" stroke="#d33" stroke-dasharray="4 2" /><text x="144" y="100" font-size="12" font-weight="700" text-anchor="middle" stroke="none" fill="#d33">1</text><circle cx="144" cy="160" r="12" fill="#fff" stroke="#d33" stroke-dasharray="4 2" /><text x="144" y="164" font-size="12" font-weight="700" text-anchor="middle" stroke="none" fill="#d33">2</text><circle cx="912" cy="96" r="12" fill="#fff" stroke="#d33" stroke-dasharray="4 2" /><text x="912" y="100" font-size="12" font-weight="700" text-anchor="middle" stroke="none" fill="#d33">3</text></g>
</svg>
