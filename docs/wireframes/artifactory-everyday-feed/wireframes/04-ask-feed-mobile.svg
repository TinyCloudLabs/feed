<svg xmlns="http://www.w3.org/2000/svg" width="375" height="812" viewBox="0 0 375 812"
     font-family="-apple-system, system-ui, sans-serif" fill="#fff" stroke="#000" stroke-width="1.5">
  <!-- viewport: mobile 375x812 -->
  <rect x="0" y="0" width="375" height="812" />
  <g><rect width="375" height="64" /><text x="16" y="40" font-size="14" stroke="none" fill="#000">← Feed</text><text x="187" y="40" font-size="20" font-weight="600" text-anchor="middle" stroke="none" fill="#000">Ask Feed</text></g>
  <!-- 1: question -->
  <g transform="translate(16,96)"><rect width="343" height="112" rx="6" /><text x="16" y="40" font-size="14" stroke="none" fill="#000">What decisions from this week</text><text x="16" y="64" font-size="14" stroke="none" fill="#000">are still unresolved?</text><text x="16" y="96" font-size="12" stroke="none" fill="#666">You · just now</text></g>
  <!-- 2: plain-language work status -->
  <g transform="translate(16,232)"><rect width="343" height="296" rx="6" /><text x="16" y="40" font-size="14" font-weight="600" stroke="none" fill="#000">Feed is looking through your context.</text><g transform="translate(16,72)"><circle cx="8" cy="8" r="8" fill="#000" /><text x="32" y="12" font-size="14" stroke="none" fill="#000">Finding conversations</text><circle cx="8" cy="64" r="8" fill="#000" /><text x="32" y="68" font-size="14" stroke="none" fill="#000">Comparing decisions</text><circle cx="8" cy="120" r="8" /><text x="32" y="124" font-size="14" stroke="none" fill="#666">Writing an answer</text></g><line x1="16" y1="224" x2="327" y2="224" stroke="#666" /><text x="16" y="256" font-size="12" stroke="none" fill="#666">Uses Listen context + Feed preferences.</text><text x="16" y="280" font-size="12" text-decoration="underline" stroke="none" fill="#000">See allowed context</text></g>
  <!-- 3: fixed composer -->
  <g transform="translate(16,680)"><rect width="343" height="56" rx="6" /><text x="16" y="32" font-size="14" stroke="none" fill="#666">Ask a follow-up…</text><rect x="272" y="8" width="56" height="40" rx="4" fill="#000" /><text x="300" y="32" font-size="14" text-anchor="middle" stroke="none" fill="#fff">Send</text></g>
  <g data-region="annotations"><circle cx="8" cy="88" r="8" fill="#fff" stroke="#d33" stroke-dasharray="4 2" /><text x="8" y="92" font-size="12" font-weight="700" text-anchor="middle" stroke="none" fill="#d33">1</text><circle cx="8" cy="224" r="8" fill="#fff" stroke="#d33" stroke-dasharray="4 2" /><text x="8" y="228" font-size="12" font-weight="700" text-anchor="middle" stroke="none" fill="#d33">2</text><circle cx="8" cy="672" r="8" fill="#fff" stroke="#d33" stroke-dasharray="4 2" /><text x="8" y="676" font-size="12" font-weight="700" text-anchor="middle" stroke="none" fill="#d33">3</text></g>
</svg>
