<svg xmlns="http://www.w3.org/2000/svg" width="375" height="812" viewBox="0 0 375 812"
     font-family="-apple-system, system-ui, sans-serif" fill="#fff" stroke="#000" stroke-width="1.5">
  <!-- viewport: mobile 375x812 -->
  <rect x="0" y="0" width="375" height="812" />
  <g transform="translate(16,24)"><rect width="32" height="32" rx="4" fill="#e6e6e6" /><text x="48" y="24" font-size="20" font-weight="600" stroke="none" fill="#000">Feed</text></g>
  <!-- 1: title -->
  <g transform="translate(16,112)"><text x="0" y="32" font-size="28" font-weight="700" stroke="none" fill="#000">Setting up your Feed</text><text x="0" y="72" font-size="14" stroke="none" fill="#666">No additional approvals are needed.</text></g>
  <!-- 2: progress list -->
  <g transform="translate(16,224)"><rect width="343" height="376" rx="6" />
    <g transform="translate(24,32)"><circle cx="16" cy="16" r="16" fill="#000" /><text x="16" y="20" font-size="14" text-anchor="middle" stroke="none" fill="#fff">✓</text><text x="56" y="16" font-size="14" font-weight="600" stroke="none" fill="#000">TinyCloud connected</text><text x="56" y="40" font-size="12" stroke="none" fill="#666">Identity and storage ready.</text></g>
    <line x1="40" y1="96" x2="40" y2="136" stroke="#666" />
    <g transform="translate(24,136)"><circle cx="16" cy="16" r="16" fill="#000" /><text x="16" y="20" font-size="14" text-anchor="middle" stroke="none" fill="#fff">✓</text><text x="56" y="16" font-size="14" font-weight="600" stroke="none" fill="#000">Context connected</text><text x="56" y="40" font-size="12" stroke="none" fill="#666">Allowed sources are readable.</text></g>
    <line x1="40" y1="200" x2="40" y2="240" stroke="#666" />
    <g transform="translate(24,240)"><circle cx="16" cy="16" r="16" /><text x="56" y="16" font-size="14" font-weight="600" stroke="none" fill="#000">Preparing your first Feed</text><text x="56" y="40" font-size="12" stroke="none" fill="#666">Making useful items now.</text><rect x="56" y="72" width="232" height="8" fill="#e6e6e6" /><rect x="56" y="72" width="144" height="8" fill="#000" /></g>
  </g>
  <!-- 3: recovery promise -->
  <text x="187" y="664" font-size="12" text-anchor="middle" stroke="none" fill="#666">If anything needs attention, Feed will say what to reconnect.</text>
  <g data-region="annotations"><circle cx="8" cy="104" r="8" fill="#fff" stroke="#d33" stroke-dasharray="4 2" /><text x="8" y="108" font-size="12" font-weight="700" text-anchor="middle" stroke="none" fill="#d33">1</text><circle cx="8" cy="216" r="8" fill="#fff" stroke="#d33" stroke-dasharray="4 2" /><text x="8" y="220" font-size="12" font-weight="700" text-anchor="middle" stroke="none" fill="#d33">2</text><circle cx="8" cy="656" r="8" fill="#fff" stroke="#d33" stroke-dasharray="4 2" /><text x="8" y="660" font-size="12" font-weight="700" text-anchor="middle" stroke="none" fill="#d33">3</text></g>
</svg>
