  <g transform="translate(16,88)"><text x="0" y="32" font-size="28" font-weight="700" stroke="none" fill="#000">Make something</text><text x="0" y="64" font-size="28" font-weight="700" stroke="none" fill="#000">you can hold</text><text x="0" y="94" font-size="14" stroke="none" fill="#666">Turn a period of life into a physical artifact.</text></g>
