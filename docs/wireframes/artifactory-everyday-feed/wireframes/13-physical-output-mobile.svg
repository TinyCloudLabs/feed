  <g transform="translate(16,672)"><text x="0" y="16" font-size="11" stroke="none" fill="#666">Feed prepares a proof first. Nothing is purchased</text><text x="0" y="32" font-size="11" stroke="none" fill="#666">or shipped until you review the final order.</text><rect y="52" width="343" height="48" rx="4" fill="#000" /><text x="171.5" y="82" font-size="14" font-weight="600" text-anchor="middle" stroke="none" fill="#fff">Prepare a preview</text></g>
