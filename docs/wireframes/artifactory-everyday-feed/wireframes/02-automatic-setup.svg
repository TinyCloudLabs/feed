<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="800" viewBox="0 0 1280 800"
     font-family="-apple-system, system-ui, sans-serif" fill="#fff" stroke="#000" stroke-width="1.5">
  <!-- viewport: desktop 1280x800 -->
  <rect x="0" y="0" width="1280" height="800" />
  <!-- 1: product header -->
  <g transform="translate(48,32)"><rect width="32" height="32" rx="4" fill="#e6e6e6" /><text x="48" y="24" font-size="20" font-weight="600" stroke="none" fill="#000">Feed</text><text x="1136" y="24" font-size="14" text-anchor="end" stroke="none" fill="#666">Signing in…</text></g>
  <!-- 2: automatic setup status -->
  <g transform="translate(360,152)" data-region="setup-status">
    <text x="280" y="32" font-size="28" font-weight="700" text-anchor="middle" stroke="none" fill="#000">Setting up your Feed</text>
    <text x="280" y="72" font-size="14" text-anchor="middle" stroke="none" fill="#666">Keep this window open. No additional approvals are needed.</text>
    <g transform="translate(0,120)">
      <rect width="560" height="336" rx="6" />
      <g transform="translate(32,32)"><circle cx="16" cy="16" r="16" fill="#000" /><text x="16" y="20" font-size="14" text-anchor="middle" stroke="none" fill="#fff">✓</text><text x="56" y="16" font-size="14" font-weight="600" stroke="none" fill="#000">TinyCloud connected</text><text x="56" y="40" font-size="12" stroke="none" fill="#666">Your identity and private space are ready.</text></g>
      <line x1="48" y1="96" x2="48" y2="136" stroke="#666" />
      <g transform="translate(32,136)"><circle cx="16" cy="16" r="16" fill="#000" /><text x="16" y="20" font-size="14" text-anchor="middle" stroke="none" fill="#fff">✓</text><text x="56" y="16" font-size="14" font-weight="600" stroke="none" fill="#000">Private context connected</text><text x="56" y="40" font-size="12" stroke="none" fill="#666">Feed can read the sources you allowed.</text></g>
      <line x1="48" y1="200" x2="48" y2="240" stroke="#666" />
      <g transform="translate(32,240)"><circle cx="16" cy="16" r="16" /><text x="56" y="16" font-size="14" font-weight="600" stroke="none" fill="#000">Preparing your first Feed</text><text x="56" y="40" font-size="12" stroke="none" fill="#666">Making a small set of useful items from recent context.</text><rect x="56" y="64" width="400" height="8" fill="#e6e6e6" /><rect x="56" y="64" width="240" height="8" fill="#000" /></g>
    </g>
  </g>
  <!-- 3: reassurance -->
  <text x="640" y="656" font-size="12" text-anchor="middle" stroke="none" fill="#666">If setup cannot finish, Feed will tell you exactly what to reconnect.</text>
  <g data-region="annotations"><circle cx="344" cy="144" r="12" fill="#fff" stroke="#d33" stroke-dasharray="4 2" /><text x="344" y="148" font-size="12" font-weight="700" text-anchor="middle" stroke="none" fill="#d33">1</text><circle cx="936" cy="272" r="12" fill="#fff" stroke="#d33" stroke-dasharray="4 2" /><text x="936" y="276" font-size="12" font-weight="700" text-anchor="middle" stroke="none" fill="#d33">2</text><circle cx="920" cy="648" r="12" fill="#fff" stroke="#d33" stroke-dasharray="4 2" /><text x="920" y="652" font-size="12" font-weight="700" text-anchor="middle" stroke="none" fill="#d33">3</text></g>
</svg>
