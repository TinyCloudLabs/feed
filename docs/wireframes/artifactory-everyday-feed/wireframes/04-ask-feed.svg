<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="800" viewBox="0 0 1280 800"
     font-family="-apple-system, system-ui, sans-serif" fill="#fff" stroke="#000" stroke-width="1.5">
  <!-- viewport: desktop 1280x800 -->
  <rect x="0" y="0" width="1280" height="800" />
  <!-- 1: nav -->
  <g><rect width="1280" height="64" /><rect x="24" y="16" width="32" height="32" rx="4" fill="#e6e6e6" /><text x="72" y="40" font-size="20" font-weight="600" stroke="none" fill="#000">Feed</text><text x="160" y="40" font-size="14" stroke="none" fill="#666">For you</text><text x="240" y="40" font-size="14" stroke="none" fill="#000">Ask Feed</text><circle cx="1232" cy="32" r="16" fill="#e6e6e6" /></g>
  <!-- 2: conversation area -->
  <g transform="translate(160,104)" data-region="conversation"><text x="0" y="32" font-size="28" font-weight="700" stroke="none" fill="#000">Ask Feed</text><text x="0" y="64" font-size="14" stroke="none" fill="#666">Ask about patterns, people, decisions, or next steps in your context.</text>
    <g transform="translate(0,104)"><rect width="760" height="112" rx="6" /><text x="24" y="40" font-size="14" stroke="none" fill="#000">What decisions from this week are still unresolved?</text><text x="24" y="80" font-size="12" stroke="none" fill="#666">You · just now</text></g>
    <g transform="translate(0,240)"><rect width="760" height="240" rx="6" /><text x="24" y="40" font-size="14" font-weight="600" stroke="none" fill="#000">Feed is looking through the context you allowed.</text><g transform="translate(24,72)"><circle cx="8" cy="8" r="8" fill="#000" /><text x="32" y="12" font-size="14" stroke="none" fill="#000">Finding relevant conversations</text><circle cx="8" cy="56" r="8" fill="#000" /><text x="32" y="60" font-size="14" stroke="none" fill="#000">Comparing decisions across meetings</text><circle cx="8" cy="104" r="8" /><text x="32" y="108" font-size="14" stroke="none" fill="#666">Writing a grounded answer</text></g><text x="24" y="216" font-size="12" stroke="none" fill="#666">You can leave this page. The result will appear in Feed activity.</text></g>
  </g>
  <!-- 3: composer -->
  <g transform="translate(160,640)" data-region="composer"><rect width="760" height="88" rx="6" /><text x="24" y="32" font-size="14" stroke="none" fill="#666">Ask a follow-up…</text><g transform="translate(608,24)"><rect width="128" height="40" rx="4" fill="#000" /><text x="64" y="24" font-size="14" text-anchor="middle" stroke="none" fill="#fff">Send</text></g></g>
  <!-- 4: context boundary -->
  <g transform="translate(968,208)" data-region="context-boundary"><rect width="264" height="248" rx="6" /><text x="24" y="40" font-size="20" font-weight="600" stroke="none" fill="#000">Using for this answer</text><text x="24" y="80" font-size="14" stroke="none" fill="#000">Recent Listen conversations</text><text x="24" y="112" font-size="14" stroke="none" fill="#000">Your Feed preferences</text><line x1="24" y1="144" x2="240" y2="144" stroke="#666" /><text x="24" y="176" font-size="12" stroke="none" fill="#666">No outside sources</text><text x="24" y="208" font-size="12" text-decoration="underline" stroke="none" fill="#000">Change allowed context</text></g>
  <g data-region="annotations"><circle cx="144" cy="96" r="12" fill="#fff" stroke="#d33" stroke-dasharray="4 2" /><text x="144" y="100" font-size="12" font-weight="700" text-anchor="middle" stroke="none" fill="#d33">1</text><circle cx="144" cy="200" r="12" fill="#fff" stroke="#d33" stroke-dasharray="4 2" /><text x="144" y="204" font-size="12" font-weight="700" text-anchor="middle" stroke="none" fill="#d33">2</text><circle cx="144" cy="632" r="12" fill="#fff" stroke="#d33" stroke-dasharray="4 2" /><text x="144" y="636" font-size="12" font-weight="700" text-anchor="middle" stroke="none" fill="#d33">3</text><circle cx="952" cy="200" r="12" fill="#fff" stroke="#d33" stroke-dasharray="4 2" /><text x="952" y="204" font-size="12" font-weight="700" text-anchor="middle" stroke="none" fill="#d33">4</text></g>
</svg>
