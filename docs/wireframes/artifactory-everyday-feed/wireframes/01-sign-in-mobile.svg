<svg xmlns="http://www.w3.org/2000/svg" width="375" height="812" viewBox="0 0 375 812"
     font-family="-apple-system, system-ui, sans-serif" fill="#fff" stroke="#000" stroke-width="1.5">
  <!-- viewport: mobile 375x812 -->
  <rect x="0" y="0" width="375" height="812" />
  <!-- 1: header -->
  <g transform="translate(16,24)"><rect width="32" height="32" rx="4" fill="#e6e6e6" /><text x="48" y="24" font-size="20" font-weight="600" stroke="none" fill="#000">Feed</text><text x="343" y="24" font-size="12" text-anchor="end" stroke="none" fill="#666">Privacy</text></g>
  <!-- 2: promise -->
  <g transform="translate(16,104)"><text x="0" y="32" font-size="28" font-weight="700" stroke="none" fill="#000">Your private context,</text><text x="0" y="64" font-size="28" font-weight="700" stroke="none" fill="#000">made useful.</text><text x="0" y="104" font-size="14" stroke="none" fill="#666">Read, ask, and shape your Feed.</text><rect x="0" y="136" width="343" height="200" rx="6" fill="#e6e6e6" /><line x1="0" y1="136" x2="343" y2="336" stroke="#666" /><line x1="343" y1="136" x2="0" y2="336" stroke="#666" /></g>
  <!-- 3: single action -->
  <g transform="translate(16,488)"><rect width="343" height="48" rx="4" fill="#000" /><text x="171" y="32" font-size="14" font-weight="600" text-anchor="middle" stroke="none" fill="#fff">Sign in with OpenKey</text></g>
  <!-- 4: concise disclosure -->
  <g transform="translate(16,568)"><text x="0" y="16" font-size="12" stroke="none" fill="#666">ONE SIGN-IN CONNECTS</text><text x="0" y="48" font-size="14" stroke="none" fill="#000">✓ The context you choose</text><text x="0" y="80" font-size="14" stroke="none" fill="#000">✓ Your private Feed storage</text><text x="0" y="112" font-size="14" stroke="none" fill="#000">✓ Feed's content-making service</text><text x="0" y="152" font-size="12" stroke="none" fill="#666">Review or revoke access anytime.</text></g>
  <g data-region="annotations"><circle cx="8" cy="16" r="8" fill="#fff" stroke="#d33" stroke-dasharray="4 2" /><text x="8" y="20" font-size="12" font-weight="700" text-anchor="middle" stroke="none" fill="#d33">1</text><circle cx="8" cy="96" r="8" fill="#fff" stroke="#d33" stroke-dasharray="4 2" /><text x="8" y="100" font-size="12" font-weight="700" text-anchor="middle" stroke="none" fill="#d33">2</text><circle cx="8" cy="480" r="8" fill="#fff" stroke="#d33" stroke-dasharray="4 2" /><text x="8" y="484" font-size="12" font-weight="700" text-anchor="middle" stroke="none" fill="#d33">3</text></g>
</svg>
