<svg xmlns="http://www.w3.org/2000/svg" width="375" height="812" viewBox="0 0 375 812"
     font-family="-apple-system, system-ui, sans-serif" fill="#fff" stroke="#000" stroke-width="1.5">
  <!-- viewport: mobile 375x812 -->
  <rect x="0" y="0" width="375" height="812" />
  <g><rect width="375" height="64" /><text x="16" y="40" font-size="14" stroke="none" fill="#000">← Settings</text></g>
  <!-- 1: title and health -->
  <g transform="translate(16,88)"><text x="0" y="32" font-size="28" font-weight="700" stroke="none" fill="#000">Access &amp; automation</text><text x="0" y="64" font-size="14" stroke="none" fill="#666">What Feed can use and do.</text><g transform="translate(0,96)"><rect width="343" height="96" rx="6" /><circle cx="32" cy="40" r="16" fill="#000" /><text x="32" y="44" font-size="14" text-anchor="middle" stroke="none" fill="#fff">✓</text><text x="64" y="40" font-size="14" font-weight="600" stroke="none" fill="#000">Feed access is healthy</text><text x="64" y="64" font-size="12" stroke="none" fill="#666">Last checked 12 minutes ago</text></g></g>
  <!-- 2: user-meaningful permissions -->
  <g transform="translate(16,320)"><text x="0" y="24" font-size="20" font-weight="600" stroke="none" fill="#000">What Feed can do</text><g transform="translate(0,48)"><rect width="343" height="72" rx="4" /><text x="16" y="32" font-size="14" font-weight="600" stroke="none" fill="#000">Read Listen context</text><text x="16" y="56" font-size="12" stroke="none" fill="#666">Transcripts · read only</text><rect x="280" y="24" width="40" height="20" rx="10" fill="#000" /><circle cx="310" cy="34" r="6" fill="#fff" /></g><g transform="translate(0,136)"><rect width="343" height="72" rx="4" /><text x="16" y="32" font-size="14" font-weight="600" stroke="none" fill="#000">Make Feed items</text><text x="16" y="56" font-size="12" stroke="none" fill="#666">Grounded drafts from context</text><rect x="280" y="24" width="40" height="20" rx="10" fill="#000" /><circle cx="310" cy="34" r="6" fill="#fff" /></g><g transform="translate(0,224)"><rect width="343" height="72" rx="4" /><text x="16" y="32" font-size="14" font-weight="600" stroke="none" fill="#000">Save Feed state</text><text x="16" y="56" font-size="12" stroke="none" fill="#666">Items and preferences</text><rect x="280" y="24" width="40" height="20" rx="10" fill="#000" /><circle cx="310" cy="34" r="6" fill="#fff" /></g></g>
  <!-- 3: optional details -->
  <g transform="translate(16,664)"><rect width="343" height="56" rx="4" /><text x="16" y="32" font-size="14" stroke="none" fill="#000">› Advanced authority details</text></g>
  <!-- 4: pause/disconnect actions -->
  <g transform="translate(16,744)"><rect width="120" height="48" rx="4" /><text x="60" y="32" font-size="14" text-anchor="middle" stroke="none" fill="#000">Pause Feed</text><rect x="152" width="152" height="48" rx="4" /><text x="228" y="32" font-size="14" text-anchor="middle" stroke="none" fill="#000">Disconnect Feed</text></g>
  <g data-region="annotations"><circle cx="8" cy="80" r="8" fill="#fff" stroke="#d33" stroke-dasharray="4 2" /><text x="8" y="84" font-size="12" font-weight="700" text-anchor="middle" stroke="none" fill="#d33">1</text><circle cx="8" cy="312" r="8" fill="#fff" stroke="#d33" stroke-dasharray="4 2" /><text x="8" y="316" font-size="12" font-weight="700" text-anchor="middle" stroke="none" fill="#d33">2</text><circle cx="8" cy="656" r="8" fill="#fff" stroke="#d33" stroke-dasharray="4 2" /><text x="8" y="660" font-size="12" font-weight="700" text-anchor="middle" stroke="none" fill="#d33">3</text><circle cx="8" cy="736" r="8" fill="#fff" stroke="#d33" stroke-dasharray="4 2" /><text x="8" y="740" font-size="12" font-weight="700" text-anchor="middle" stroke="none" fill="#d33">4</text></g>
</svg>
