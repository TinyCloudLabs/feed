  <g data-region="annotations"><circle cx="8" cy="8" r="8" fill="#fff" stroke="#d33" stroke-dasharray="4 2" /><text x="8" y="12" font-size="12" font-weight="700" text-anchor="middle" stroke="none" fill="#d33">1</text><circle cx="8" cy="80" r="8" fill="#fff" stroke="#d33" stroke-dasharray="4 2" /><text x="8" y="84" font-size="12" font-weight="700" text-anchor="middle" stroke="none" fill="#d33">2</text><circle cx="8" cy="176" r="8" fill="#fff" stroke="#d33" stroke-dasharray="4 2" /><text x="8" y="180" font-size="12" font-weight="700" text-anchor="middle" stroke="none" fill="#d33">3</text><circle cx="8" cy="736" r="8" fill="#fff" stroke="#d33" stroke-dasharray="4 2" /><text x="8" y="740" font-size="12" font-weight="700" text-anchor="middle" stroke="none" fill="#d33">4</text></g>
