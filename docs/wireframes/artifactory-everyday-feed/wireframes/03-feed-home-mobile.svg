<svg xmlns="http://www.w3.org/2000/svg" width="375" height="812" viewBox="0 0 375 812"
     font-family="-apple-system, system-ui, sans-serif" fill="#fff" stroke="#000" stroke-width="1.5">
  <!-- viewport: mobile 375x812 -->
  <rect x="0" y="0" width="375" height="812" />
  <!-- 1: compact nav -->
  <g transform="translate(0,0)"><rect width="375" height="64" /><rect x="16" y="16" width="32" height="32" rx="4" fill="#e6e6e6" /><text x="64" y="40" font-size="20" font-weight="600" stroke="none" fill="#000">Feed</text><circle cx="343" cy="32" r="16" fill="#e6e6e6" /></g>
  <!-- 2: title + ask -->
  <g transform="translate(16,88)"><text x="0" y="32" font-size="28" font-weight="700" stroke="none" fill="#000">For you</text><g transform="translate(216,0)"><rect width="128" height="40" rx="4" fill="#000" /><text x="64" y="24" font-size="14" font-weight="600" text-anchor="middle" stroke="none" fill="#fff">Ask Feed</text></g><text x="0" y="64" font-size="14" stroke="none" fill="#666">Made from your recent context.</text></g>
  <!-- 3: item cards -->
  <g transform="translate(16,184)"><rect width="343" height="240" rx="6" /><text x="16" y="32" font-size="12" stroke="none" fill="#666">INSIGHT · 3 CONVERSATIONS</text><text x="16" y="72" font-size="20" font-weight="600" stroke="none" fill="#000">The decision that keeps</text><text x="16" y="96" font-size="20" font-weight="600" stroke="none" fill="#000">resurfacing</text><text x="16" y="128" font-size="14" stroke="none" fill="#666">A short synthesis of what changed.</text><rect x="16" y="152" width="311" height="32" fill="#e6e6e6" /><text x="16" y="216" font-size="14" stroke="none" fill="#000">Save</text><text x="80" y="216" font-size="14" stroke="none" fill="#000">Helpful</text><text x="311" y="216" font-size="12" text-anchor="end" stroke="none" fill="#666">Why this?</text></g>
  <g transform="translate(16,448)"><rect width="343" height="216" rx="6" /><text x="16" y="32" font-size="12" stroke="none" fill="#666">BRIEF · LISTEN CONTEXT</text><text x="16" y="72" font-size="20" font-weight="600" stroke="none" fill="#000">A person worth following</text><text x="16" y="96" font-size="20" font-weight="600" stroke="none" fill="#000">up with</text><text x="16" y="128" font-size="14" stroke="none" fill="#666">A useful next conversation.</text><rect x="16" y="152" width="311" height="24" fill="#e6e6e6" /><text x="16" y="200" font-size="14" stroke="none" fill="#000">Save</text><text x="80" y="200" font-size="14" stroke="none" fill="#000">Helpful</text></g>
  <!-- 4: bottom navigation -->
